<!DOCTYPE html>
<html>
<head>
  <title>Reports</title>
  <link rel="stylesheet" href="css/report.css">
</head>

<body>

<div class="dashboard">

  <!-- 🔝 TOP BAR -->
  <div class="top-bar">
    <h2>Reports 📊</h2>
    <button onclick="goBack()">Back</button>
  </div>

  <!-- 👑 PREMIUM MESSAGE -->
  <h3 id="premiumMsg"></h3>

  <!-- 📅 FILTER -->
  <div class="filters">
    <button onclick="filterData('daily')">Daily</button>
    <button onclick="filterData('weekly')">Weekly</button>
    <button onclick="filterData('monthly')">Monthly</button>
  </div>

  <!-- 📥 DOWNLOAD -->
  <button id="downloadBtn">Download Report</button>

  <!-- 📊 TABLE -->
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Date</th>
          <th>Description</th>
          <th>Category</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody id="reportTable"></tbody>
    </table>
  </div>

</div>

<script src="js/report.js"></script>

<script>
function goBack() {
  window.location.href = "expense.html";
}
</script>

</body>
</html>
